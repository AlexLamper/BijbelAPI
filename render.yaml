services:
  - type: web
    name: bijbelapi
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && npm ci && npm run build:css
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATA_DIR
        value: /opt/render/project/src/private-data
