services:
  - type: web
    name: bijbelapi
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && npm ci && npm run build:css
    startCommand: python scripts/sync_private_data.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Secrets in Render Dashboard handmatig/koppelen: MONGODB_URI, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
      # STRIPE_PRICE_ID_PRO_MONTHLY, STRIPE_PRICE_ID_PRO_YEARLY. Optioneel: BILLING_ENFORCED=true, APP_BASE_URL,
      # FREE_TIER_DAILY_LIMIT, PRO_TIER_DAILY_LIMIT, DEBUG_BILLING=false
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATA_DIR
        value: /opt/render/project/src/private-data
      - key: GITHUB_DATA_REPO
        value: AlexLamper/bijbelapi-data
      - key: GITHUB_DATA_BRANCH
        value: main
      - key: GITHUB_DATA_SUBDIR
        value: data
      - key: REQUIRE_PRIVATE_DATA
        value: true
      - key: MONGODB_DB_NAME
        value: bijbelapi
      - key: BILLING_ENFORCED
        value: "true"
      - key: APP_BASE_URL
        value: "https://bijbelapi.com"
      - key: CANONICAL_PUBLIC_URL
        value: "https://bijbelapi.com"
