<section id="versions" class="border-y border-slate-100 bg-white py-6 md:py-10">
    <div class="mx-auto max-w-7xl 2xl:max-w-[1600px] px-6 md:px-8 2xl:px-6 py-14 md:py-16">

        <!-- Section header -->
        <div class="mb-8 flex flex-col items-center text-center">
            <span class="mb-3 inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-medium uppercase tracking-widest text-slate-700">
                Bijbelvertalingen
            </span>
            <h2 class="mb-3 text-3xl font-semibold tracking-tight text-slate-900">Beschikbare vertalingen</h2>
            <p class="max-w-md text-sm leading-relaxed text-slate-600">
                Deze lijst wordt live geladen via
                <code class="rounded-md border border-slate-200 bg-slate-50 px-1.5 py-0.5 font-mono text-xs text-slate-700">GET /api/versions</code>.
            </p>
        </div>

        <!-- Loading state -->
        <div id="versionsLoading" class="flex items-center justify-center gap-3 rounded-2xl border border-slate-100 bg-slate-50 py-12 text-sm text-slate-600">
            <svg class="h-4 w-4 animate-spin text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Vertalingen laden…
        </div>

        <!-- Error state -->
        <div id="versionsError" class="hidden flex items-center gap-3 rounded-2xl border border-red-100 bg-red-50 px-5 py-4 text-sm text-red-600"></div>

        <!-- Debug (hidden by default) -->
        <div id="versionsDebug" class="debug-json-pre mt-3 hidden overflow-x-auto"></div>

        <!-- Card grid -->
        <div id="versionsGrid" class="mt-2 grid gap-5 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>
</section>
